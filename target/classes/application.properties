server.port=${PORT:8080}
ai.service.base-url=${AI_SERVICE_URL:http://localhost:5000}

# Database Configuration
# Local: Uses H2 file-based database
# Production (Railway): Uses PostgreSQL via DATABASE_URL environment variable
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/advising-portal;AUTO_SERVER=TRUE}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect

# H2 Console (local development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
