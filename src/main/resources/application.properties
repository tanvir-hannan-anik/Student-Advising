server.port=${PORT:8080}
ai.service.base-url=${AI_SERVICE_URL:http://localhost:5000}

# Database configuration - support both H2 (local) and PostgreSQL (production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/advising-portal;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Web Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
